apiVersion: v1
kind: ServiceAccount
metadata:
  name: gokube-scheduler
  namespace: gokube
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gokube-scheduler
  namespace: gokube
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gokube-scheduler
  namespace: gokube
subjects:
  - kind: ServiceAccount
    name: gokube-scheduler
    namespace: gokube
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gokube-scheduler
